<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сіздерге арналған тосын сый ❤️</title>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --bg-color: #fff0f3;
            --slide-duration: 3s; 
        }

        /* Мәтін мен элементтер көк болып ерекшеленбеуі үшін (Синий прозрачный болмас үшін) */
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            transition: background 1s ease;
        }

        .container {
            text-align: center;
            animation: fadeIn 1.5s ease;
            z-index: 10;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .media-box {
            max-width: 280px;
            width: 90%;
            aspect-ratio: 1 / 1;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            overflow: hidden;
            background: #fff;
            position: relative;
        }

        .slideshow-container img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease-in-out, transform 1s ease-in-out;
            transform: scale(1.1);
        }

        .slideshow-container img.active {
            opacity: 1;
            transform: scale(1);
        }

        h1 {
            color: #c9184a;
            font-size: 1.6rem;
            line-height: 1.3;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            height: 140px;
            position: relative;
        }

        button {
            padding: 15px 0;
            width: 220px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #noBtn {
            background-color: #adb5bd;
        }

        #successScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .invite-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.15);
            margin: 15px 0;
            text-align: left;
            border-left: 6px solid #ff4d6d;
            width: 100%;
            box-sizing: border-box;
        }

        /* Карта батырмасы */
        .btn-2gis {
            display: block;
            margin-top: 15px;
            background: #2ab44a;
            color: white !important;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            transition: 0.3s;
        }

        .btn-2gis:active {
            transform: scale(0.95);
            background: #23943d;
        }

        .heart {
            position: fixed;
            font-size: 20px;
            pointer-events: none;
            animation: moveHearts 4s linear forwards;
            z-index: 1;
        }

        @keyframes moveHearts {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="container" id="mainScreen">
        <div class="media-box">
            <img src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExenIyYjBvMzk4Ynp2MGpyMnQwemwyMzB4M3kxYXZvd3RzM28yYnNlaiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/0OgdJVNjbcIifqSb7U/giphy.gif" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <h1>Мерекелік кешкі асқа бізбен бірге баруға қалай қарайсыздар? 🌷</h1>
        <div class="buttons">
            <button id="yesBtn" onclick="showSuccess()">Әрине, барамыз! ❤️</button>
            <button id="noBtn">Жоқ</button>
        </div>
    </div>

    <div class="container" id="successScreen">
        <div class="media-box">
            <div class="slideshow-container" id="slideshow">
                <img src="5e71eb83-b545-4674-af8d-e1a9a39d0d2b.jpeg" class="active">
                <img src="b5b2e6d7-ddbe-421f-9d27-b5fc0229da54.jpeg">
                <img src="c64bebbd-3c35-4284-8789-69513c1db768.jpeg">
                <img src="4a415bdc-4f30-4b49-8dfd-416e88da3a69.jpeg">
            </div>
        </div>

        <div class="invite-card">
            <h2 style="color: #ff4d6d; margin: 0; font-size: 1.5rem;">Керемет! 😍</h2>
            <p>📍 <b>Мекенжай:</b> Жамақаев көшесі, 144</p>
            <p>📅 <b>Күні:</b> 9 наурыз, 18:00</p>
            <a href="https://2gis.kz/almaty/geo/70000001095720040" target="_blank" class="btn-2gis">🗺️ 2GIS Картаны ашу</a>
        </div>
        <p style="color: #c9184a; font-weight: bold;">22-02 жігіттерінен! 🌹</p>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const bgMusic = document.getElementById('bgMusic');

        // Қашатын батырма
        function moveButton() {
            const padding = 50;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            noBtn.style.position = 'fixed';
            noBtn.style.left = Math.random() * maxX + 'px';
            noBtn.style.top = Math.random() * maxY + 'px';
        }
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveButton(); });

        // Музыканы бақылау (Сайттан шыққанда өшу)
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                bgMusic.pause();
            } else {
                if (document.getElementById('successScreen').style.display === 'flex') {
                    bgMusic.play();
                }
            }
        });

        function showSuccess() {
            bgMusic.play().catch(() => {});
            document.getElementById('mainScreen').style.display = 'none';
            const ss = document.getElementById('successScreen');
            ss.style.display = 'flex';
            setTimeout(() => ss.style.opacity = '1', 50);
            
            setInterval(createHeart, 300);
            startSlides();
        }

        function startSlides() {
            let index = 0;
            const images = document.querySelectorAll('.slideshow-container img');
            setInterval(() => {
                images[index].classList.remove('active');
                index = (index + 1) % images.length;
                images[index].classList.add('active');
            }, 3000);
        }

        function createHeart() {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = ['🌷','🌸','🌹','❤️'][Math.floor(Math.random()*4)];
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDuration = (Math.random()*2+3)+'s';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }
    </script>
</body>
</html>
