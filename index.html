<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сіздерге арналған тосын сый ❤️</title>
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff85a1;
            --glass: rgba(255, 255, 255, 0.8);
            --shadow: 0 8px 32px 0 rgba(255, 77, 109, 0.2);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Анимирленген градиентті фон */
            background: linear-gradient(-45deg, #fff0f3, #ffccd5, #fff0f3, #ffb3c6);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            max-width: 420px;
            padding: 25px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: var(--shadow);
            text-align: center;
            animation: cardAppear 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            z-index: 10;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .media-box {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 22px;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            background: #fff;
        }

        .slideshow-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slideshow-container img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: all 1.2s ease-in-out;
            transform: scale(1.1);
        }

        .slideshow-container img.active {
            opacity: 1;
            transform: scale(1);
        }

        h1 {
            color: #c9184a;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        button {
            border: none;
            padding: 16px;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #yesBtn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
        }

        #yesBtn:active { transform: scale(0.96); }

        #noBtn {
            background: #f8f9fa;
            color: #adb5bd;
            font-size: 0.9rem;
        }

        /* Табысты экран стилі */
        #successScreen {
            display: none;
            flex-direction: column;
        }

        .invite-details {
            text-align: left;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
        }

        .invite-details p {
            margin: 8px 0;
            color: #555;
            font-size: 0.95rem;
        }

        .countdown-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 20px 0;
        }

        .time-unit {
            background: white;
            padding: 10px 5px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .time-num {
            display: block;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .time-label {
            font-size: 0.65rem;
            color: #999;
            text-transform: uppercase;
        }

        .btn-2gis {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #2ab44a;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 18px;
            font-weight: 600;
            margin-top: 10px;
            transition: 0.3s;
        }

        .heart {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            animation: moveHearts 4s linear forwards;
        }

        @keyframes moveHearts {
            0% { transform: translateY(100vh) scale(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5) rotate(360deg); opacity: 0; }
        }

        .signature {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: 600;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="container" id="mainScreen">
        <div class="media-box">
            <img src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExenIyYjBvMzk4Ynp2MGpyMnQwemwyMzB4M3kxYXZvd3RzM28yYnNlaiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/0OgdJVNjbcIifqSb7U/giphy.gif" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <h1>Мерекелік кешкі асқа бізбен бірге баруға қалай қарайсыздар? 🌷</h1>
        <div class="buttons">
            <button id="yesBtn" onclick="showSuccess()">Әрине, барамыз! ❤️</button>
            <button id="noBtn">Жоқ</button>
        </div>
    </div>

    <div class="container" id="successScreen">
        <div class="media-box">
            <div class="slideshow-container" id="slideshow">
                <img src="5e71eb83-b545-4674-af8d-e1a9a39d0d2b.jpeg" class="active">
                <img src="b5b2e6d7-ddbe-421f-9d27-b5fc0229da54.jpeg">
                <img src="c64bebbd-3c35-4284-8789-69513c1db768.jpeg">
                <img src="4a415bdc-4f30-4b49-8dfd-416e88da3a69.jpeg">
                <img src="659e9ddb-fad5-428c-9ff0-254863438c22.jpeg">
                <img src="6762d7e1-5dc5-461d-b88e-972487af0fb2.jpeg">
                <img src="ae5cd613-0a23-456a-b17e-18dbebf23eeb.jpeg">
                <img src="4dd84c20-7b36-40f7-b4bc-ccbc98c495fb.jpeg">
                <img src="3b9bc54e-e1f2-4071-9264-c3f2c13333d2.jpeg">
                <img src="df5e8465-4553-4fb3-9ca2-e20d8c8ad3f1.jpeg">
            </div>
        </div>

        <h2 style="color: var(--primary); margin-bottom: 10px;">Керемет таңдау! 😍</h2>
        <p style="font-size: 0.9rem; color: #666; font-style: italic; line-height: 1.5;">
            "Сіздерді мерекелік дастархан басында көру — біз үшін үлкен мәртебе!"
        </p>

        <div class="invite-details">
            <p>📍 <b>Мекенжай:</b> Жамақаев көшесі, 144</p>
            <p>📅 <b>Күні:</b> 9 наурыз, 18:00</p>
        </div>

        <div class="countdown-container" id="timer">
            <div class="time-unit"><span class="time-num" id="days">0</span><span class="time-label">Күн</span></div>
            <div class="time-unit"><span class="time-num" id="hours">0</span><span class="time-label">Сағат</span></div>
            <div class="time-unit"><span class="time-num" id="mins">0</span><span class="time-label">Мин</span></div>
            <div class="time-unit"><span class="time-num" id="secs">0</span><span class="time-label">Сек</span></div>
        </div>

        <a href="https://2gis.kz/almaty/geo/70000001095720040" target="_blank" class="btn-2gis">
            <span>🗺️ 2GIS Картаны ашу</span>
        </a>

        <p class="signature">Терең құрметпен: 22-02 жігіттерінен! 🌹</p>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const bgMusic = document.getElementById('bgMusic');
        const successScreen = document.getElementById('successScreen');
        const mainScreen = document.getElementById('mainScreen');

        // Қашатын батырма
        function moveButton() {
            const padding = 50;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            noBtn.style.position = 'fixed';
            noBtn.style.left = Math.random() * maxX + 'px';
            noBtn.style.top = Math.random() * maxY + 'px';
            noBtn.style.zIndex = '1000';
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveButton(); });

        function showSuccess() {
            mainScreen.style.animation = 'cardAppear 0.5s reverse forwards';
            setTimeout(() => {
                mainScreen.style.display = 'none';
                successScreen.style.display = 'flex';
                bgMusic.play().catch(e => console.log("Music blocked"));
                setInterval(createHeart, 400);
                startSlides();
                startTimer();
            }, 500);
        }

        function startSlides() {
            let index = 0;
            const images = document.querySelectorAll('.slideshow-container img');
            setInterval(() => {
                images[index].classList.remove('active');
                index = (index + 1) % images.length;
                images[index].classList.add('active');
            }, 3000);
        }

        function createHeart() {
            const h = document.createElement('div');
            h.className = 'heart';
            const emojis = ['🌷','🌸','🌹','❤️','✨'];
            h.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 20 + 15) + 'px';
            h.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }

        function startTimer() {
            const target = new Date("March 9, 2026 18:00:00").getTime();
            setInterval(() => {
                const now = new Date().getTime();
                const diff = target - now;
                if (diff < 0) return;

                document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById('secs').innerText = Math.floor((diff % (1000 * 60)) / 1000);
            }, 1000);
        }
    </script>
</body>
</html>
